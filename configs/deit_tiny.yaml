model: deit_tiny_patch16_224
data_dir: /home/data/imagenet
output: /cluster/nvme4a/hrz/output

train_interpolation: bicubic
aa: rand-m9-mstd0.5-inc1
mixup: 0.8
cutmix: 1.0
mixup_prob: 1.0
reprob: 0.25
drop: 0.0
drop_path: 0.0

batch_size: 256
lr_base_size: 128
epochs: 300
sched: cosine
lr_base: 5e-4
warmup_lr: 5e-7
warmup_epochs: 20
min_lr: 5e-6
weight_decay: 0.05
opt: adamw
opt_eps: 1e-8

log_wandb: true
wandb_project: vit
checkpoint_hist: 3
log_interval: 100

amp: true
channels_last: true
torchcompile: inductor
torchcompile_mode: max-autotune
workers: 12
use_multi_epochs_loader: true
